

services:
  # ── API ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app/api
      - ./templates:/app/templates
      - shared-data:/data
      - upload-data:/uploads
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - CHROMADB_URL=http://chromadb:8100
      - TEMPORAL_HOST=temporal:7233
      - OLLAMA_URL=http://ollama:11434
      - S3_ENDPOINT=http://localstack:4566
      - S3_BUCKET=documents
      - UPLOAD_DIR=/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-net

  postgresql:
    image: postgres:17
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      app-net:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Temporal Workers ─────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    volumes:
      - ./workers:/app/workers
      - shared-data:/data
      - upload-data:/uploads
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - CHROMADB_URL=http://chromadb:8000
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_TASK_QUEUE=document-processing
      - TEMPORAL_CONNECT_RETRIES=30
      - TEMPORAL_CONNECT_DELAY_SECONDS=2
      - LOG_LEVEL=INFO
      - OLLAMA_URL=http://ollama:11434
      - S3_ENDPOINT=http://localstack:4566
      - S3_BUCKET=documents
      - UPLOAD_DIR=/uploads
    depends_on:
      elasticsearch:
        condition: service_healthy
      chromadb:
        condition: service_started
      temporal:
        condition: service_started
    restart: unless-stopped
    networks:
      - app-net

  # ── Frontend (nginx) ─────────────────────────────────
  frontend:
    image: nginx:1.27-alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-net

  # ── Elasticsearch ────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
      - shared-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-net

  # ── ChromaDB ─────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.5.23
    ports:
      - "8100:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
    networks:
      - app-net

  # ── Temporal ─────────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:latest
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgresql
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig
    ports:
      - "7233:7233"
    networks:
      app-net:
    healthcheck:
      test: ["CMD-SHELL", "echo"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ── Visual workflow debugger ──
  temporal-ui:
    image: temporalio/ui:latest
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8080
    networks:
      app-net:
    ports:
      - "8080:8080"

  # ── Ollama (Local AI) ───────────────────────────────
  ollama:
    image: ollama/ollama:0.4.7
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - app-net

  # ── LocalStack (S3) ─────────────────────────────────
  localstack:
    image: localstack/localstack:4.0
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=us-east-1
    volumes:
      - localstack-data:/var/lib/localstack
    networks:
      - app-net

volumes:
  es-data:
  chroma-data:
  ollama-data:
  localstack-data:
  shared-data:
  upload-data:
  pgdata:

networks:
  app-net:
    driver: bridge
